<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  </head>
  <body>
    <!--  div =>  class="aaa" -->
    <header class="matrix">    
      <img class="matrix__img" src="./eisenhower-matrix.jpg" alt="The Eisenhower matrix">
      <!-- a =>  class="more_inf" -->
      <a class="matrix__info" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>
    <!-- div =>  class="centered-main-page-element" -->
    <main class="main">
      <!-- p => class="topSectionForAddingElementToList" -->
      <section id="add">
        <!-- <label for="new-task" class="h3 new-task__label">Add Item</label> -->
        <label for="new-task" class="h3 new-task__label">Add Item</label>
        <!-- div => class="task-row-wrapper" -->
        <div class="task-wrapper">
          <input id="new-task" class="task__text new-task__text" type="text">
          <button class="btn">Add</button>
        </div>
      </section>
      <h3 class="h3">Todo</h3>
      <!-- ul => id="incompleteTasks" -->
      <ul id="todo">
        <li class="task">
          <input class="task__checkbox" type="checkbox">
          <label class="task__label">Pay Bills</label>
          <input type="text" class="task__text">
          <button class="edit btn">Edit</button>
          <button class="delete btn"><img class="btn__img" src="./remove.svg" alt="Remove button"></button>
        </li>
        <!-- li => class="editMode" -->
        <li class="task edit-mode">
          <input class="task__checkbox" type="checkbox">
          <label class="task__label">Go Shopping</label>
          <input type="text" value="Go Shopping" class="task__text">
          <button class="edit btn">Save</button>
          <button class="delete btn"><img class="btn__img" src="./remove.svg" alt="Remove button"></button>
        </li>
      </ul>
      <h3 class="h3">Completed</h3>
      <!-- ul => id="completed-tasks" -->
      <ul id="completed">
        <li class="task">
          <input class="task__checkbox" type="checkbox" checked>
          <label class="task__label">See the Doctor</label>
          <input type="text" class="task__text">
          <button class="edit btn">Edit</button>
          <button class="delete btn"><img class="btn__img" src="./remove.svg" alt="Remove button"></button>
        </li>
      </ul>
    </main>
    <script src="app.js"></script>
  </body>
</html>
